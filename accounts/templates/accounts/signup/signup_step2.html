{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>TOSSR Sign Up - Step 2</title>
    <link rel="stylesheet" href="{% static 'accounts/css/auth.css' %}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tom-select/dist/css/tom-select.css">
</head>
<body>

<div class="card">
    <div class="logo">TOSSR</div>
    <div class="subtitle">Complete your profile</div>
    <div class="step-indicator">Step 2 of 2</div>

    <form method="POST">
        {% csrf_token %}

        <input type="text" name="forename" placeholder="Forename" required>

        <input type="text" name="surname" placeholder="Surname" required>

        <select id="id_degree" name="degree" placeholder="Search your degree..." required>
            <option value="">Search your degree...</option>
        </select>

        <input type="text" name="graduation_year" placeholder="Graduation year" required>

        <textarea name="bio" placeholder="Bio" rows="4"></textarea>

        <button type="submit">Create Account</button>
    </form>

    <div class="footer">
        Need to change your email or password?
        <a href="{% url 'accounts:signup_step1' %}">Go back</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/tom-select/dist/js/tom-select.complete.min.js"></script>
<script>
new TomSelect("#id_degree", {
    valueField: 'name',
    labelField: 'name',
    searchField: 'name',
    maxOptions: 20,
    create: false,
    loadThrottle: 300,

    load: function(query, callback) {
        if (query.length < 2) return callback();

        fetch(`/accounts/api/degrees/?q=${encodeURIComponent(query)}`)
            .then(res => res.json())
            .then(data => callback(data))
            .catch(() => callback());
    },

    render: {
        no_results: function() {
            return '<div class="no-results">No degrees found</div>';
        }
    }
});
</script>
</body>
</html>
