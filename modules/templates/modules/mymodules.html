<!DOCTYPE html>
<html>
<head>
    <title>My Modules</title>
    <style>
        body {
            margin: 0;
            background: #f3f4f6;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            padding: 20px;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        
        h1 {
            color: #1f2937;
            margin-bottom: 10px;
        }
        
        .filter-section {
            background: white;
            padding: 20px;
            border-radius: 14px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            margin-bottom: 30px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: flex-end;
        }
        
        .filter-section select {
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #e5e7eb;
            font-size: 14px;
            cursor: pointer;
        }
        
        .filter-section select:focus {
            outline: none;
            border-color: #6366f1;
        }
        
        .filter-section button {
            padding: 10px 20px;
            background: #6366f1;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
        }
        
        .filter-section button:hover {
            background: #4f46e5;
        }
        
        .modules-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }
        
        .module {
            background: white;
            border-radius: 14px;
            padding: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            transition: box-shadow 0.3s ease;
        }
        
        .module:hover {
            box-shadow: 0 30px 60px rgba(0,0,0,0.12);
        }
        
        .module h3 {
            margin-top: 0;
            color: #1f2937;
            margin-bottom: 15px;
            font-size: 16px;
        }
        
        .module-info {
            display: flex;
            flex-direction: column;
            gap: 10px;
            font-size: 14px;
            color: #6b7280;
        }
        
        .module-info strong {
            color: #1f2937;
        }
        
        .no-modules {
            background: white;
            padding: 40px;
            border-radius: 14px;
            text-align: center;
            color: #6b7280;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Modules</h1>
        
        {% if modules %}
            <div class="filter-section">
                <form method="GET" style="display: flex; gap: 15px; flex-wrap: wrap; align-items: flex-end; width: 100%;">
                    <select name="school">
                        <option value="">All Schools</option>
                        {% for school in schools %}
                            <option value="{{ school.id }}">{{ school.name }}</option>
                        {% endfor %}
                    </select>
                    
                    <select name="level">
                        <option value="">All Levels</option>
                        <option value="1">Level 1</option>
                        <option value="2">Level 2</option>
                        <option value="3">Level 3</option>
                        <option value="4">Level 4</option>
                        <option value="5">Level 5</option>
                    </select>
                    
                    <button type="submit">Filter</button>
                </form>
            </div>
            
            <div class="modules-grid">
                {% for module in modules %}
                    <div class="module">
                        <h3>{{ module.id }}: {{ module.name }}</h3>
                        <div class="module-info">
                            <div><strong>School:</strong> {{ module.school.name }}</div>
                            <div><strong>Level:</strong> {{ module.level }}</div>
                            <div><strong>Credits:</strong> {{ module.credits }}</div>
                        </div>
                    </div>
                {% endfor %}
            </div>
        {% else %}
            <div class="no-modules">
                <p>No modules available.</p>
            </div>
        {% endif %}
    </div>
</body>
</html>
