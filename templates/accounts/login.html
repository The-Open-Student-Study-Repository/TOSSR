{% load static %}
<!DOCTYPE html>
<html>
<head>
<title>TOSSR Login</title>
<link rel="stylesheet" href="{% static 'accounts/css/auth.css' %}">
</head>

<body>

<div class="card">

<div class="logo">TOSSR</div>
<div class="subtitle">Log in to your account</div>

{% if error %}
<div class="error-popup">
    {{ error }}
</div>
{% endif %}

<form method="POST">
{% csrf_token %}

<input type="text" name="username" placeholder="Username" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

<div class="footer">
Don't have an account?  
<a href="{% url 'accounts:signup_step1' %}">Sign up</a>
</div>

</div>

</body>
</html>
