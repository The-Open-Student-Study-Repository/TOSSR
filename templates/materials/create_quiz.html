{% extends 'base.html' %}
{% load static %}

{% block title_block %}
Create Quiz
{% endblock %}

{% block head_block %}
<link rel="stylesheet" href="{% static 'materials/css/create_quiz.css' %}">
{% endblock %}

{% block body_block %}
<div id="create-quiz-root"
     data-csrf-token="{{ csrf_token }}"
     data-api-url="{% url 'materials:api_create_quiz' %}"
     data-redirect-url="{% url 'materials:my_resources' %}"></div>

<div class="create-quiz-container">
    <div class="create-quiz-wrapper">
        <h1>Create Quiz</h1>

        <div class="form-section">
            <label for="module">Module</label>
            <select id="module" name="module">
                <option value="">-- Select a module --</option>
                {% for module in subscribed %}
                    <option value="{{ module.id }}" {% if initial_module_id == module.id %}selected{% endif %}>
                        {{ module.id }}: {{ module.name }}
                    </option>
                {% endfor %}
            </select>
        </div>

        <div class="form-section">
            <label for="title">Quiz Title</label>
            <input type="text" id="title" name="title" placeholder="e.g., Chapter 3 Review Quiz">
        </div>

        <div class="question-input-section">
            <div class="form-section">
                <label for="question-text">Question</label>
                <textarea id="question-text" name="question-text" placeholder="What is the question?"></textarea>
            </div>

            <div class="form-section">
                <label>Answers</label>
                <div class="answers-container" id="answers-container">
                    <div class="answer-input">
                        <input type="text" class="answer-text" placeholder="Answer option 1">
                        <input type="checkbox" class="answer-correct" title="Mark as correct answer">
                        <label>Correct</label>
                        <button type="button" class="remove-answer-btn">Remove</button>
                    </div>
                    <div class="answer-input">
                        <input type="text" class="answer-text" placeholder="Answer option 2">
                        <input type="checkbox" class="answer-correct" title="Mark as correct answer">
                        <label>Correct</label>
                        <button type="button" class="remove-answer-btn">Remove</button>
                    </div>
                </div>
                <button type="button" class="add-answer-btn">+ Add Answer Option</button>
            </div>

            <button type="button" id="addQuestionBtn" class="add-question-btn">+ Add Question to Quiz</button>
        </div>

        <div id="quiz-questions-list" class="quiz-questions-list"></div>

        <div id="message" class="message"></div>

        <div class="action-buttons">
            <a href="{% url 'materials:my_resources' %}" class="btn btn-cancel">Cancel</a>
            <div style="display: flex; align-items: center; gap: 12px;">
                <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; margin: 0; font-weight: normal;">
                    <input type="checkbox" id="publish" name="publish" checked>
                    Publish
                </label>
                <button type="button" id="submitBtn" class="btn btn-submit">Create Quiz</button>
            </div>
        </div>
    </div>
</div>

<script src="{% static 'materials/js/create_quiz.js' %}"></script>
{% endblock %}
