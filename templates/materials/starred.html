{% if starred %}
<h4><strong><u>Starred Materials:</u></strong></h4>
<ul>
    {% for material in starred %}
        {% if material == current_material %}
        <li><strong><a href="#">{{ material.name }}</a></strong></li>
        {% else %}
        <li><a href="#">{{ material.name }}</a></li>
        {% endif %}
    {% endfor %}
</ul>
{% endif %}
