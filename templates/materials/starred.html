{% if starred %}
<div class="nav-label">
<h4><strong><u>Starred Materials:</u></strong></h4>
<ul>
    {% for material in starred %}
        {% if material == current_material %}
        <li><strong><a href="#" class="nav-link">{{ material.name }}</a></strong></li>
        {% else %}
        <li><a href="#" class="nav-link">{{ material.name }}</a></li>
        {% endif %}
    {% endfor %}
</ul>
</div>
{% endif %}
