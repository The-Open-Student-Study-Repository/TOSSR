{% if starred %}
<div class="nav-label">
<h4><strong><u>Starred Modules:</u></strong></h4>
<ul>
    {% for module in starred %}
        {% if module == current_module %}
        <li><strong><a href="#" class="nav-link">{{ module.module.name }}</a></strong></li>
        {% else %}
        <li><a href="#" class="nav-link">{{ module.module.name }}</a></li>
        {% endif %}
    {% endfor %}
</ul>
</div>
{% endif %}
